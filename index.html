<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invitación K‑Pop | Emilia cumple 7</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Kanit:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg" aria-hidden="true">
    <canvas id="stars"></canvas>
    <div class="bg-vignette"></div>
    <div class="bg-balloons" id="bgBalloons"></div>
  </div>
  <div class="scene">
    <div class="glow"></div>
    <div class="hang-lights" aria-hidden="true">
      <svg class="wire w1" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0,10 C25,30 75,30 100,10" />
      </svg>
      <svg class="wire w2" viewBox="0 0 100 40" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0,8 C30,24 70,24 100,8" />
      </svg>
      <div class="string s1">
        <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
        <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
      </div>
      <div class="string s2">
        <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
        <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
      </div>
    </div>
    <div class="card">
      <div class="hero-block">
        <div class="curve-wrap">
          <svg class="curve" viewBox="0 0 700 300" aria-label="Te invito a mi cumpleaños">
            <defs>
              <filter id="svgGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
            <path id="arcTop" d="M 60 288 A 330 330 0 0 1 640 288" fill="none"/>
            <text filter="url(#svgGlow)" font-size="60">
              <textPath href="#arcTop" startOffset="50%" text-anchor="middle" dy="22">Te invito a mi cumpleaños</textPath>
            </text>
          </svg>
          <div class="corner-glows" aria-hidden="true">
            <span class="glow glow-l"></span>
            <span class="glow glow-r"></span>
          </div>
        </div>
        <div class="hero-photo">
          <img class="hero-img" src="img/segunda.PNG" alt="Imagen del cumpleaños">
        </div>
        <div class="name-wrap">
          <div class="name">Emilia</div>
          <div class="name-underline" aria-hidden="true"></div>
          <div class="name-stars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="photo-card">
          <div class="polaroid">
            <img src="img/segunda.PNG" alt="Foto destacada">
          </div>
          <div class="years">¡Cumplo <span class="years-num">7</span> años!</div>
        </div>
        <div class="music" id="music">
          <div class="music-card" id="musicCard">
            <button class="music-btn" id="musicBtn" aria-label="Reproducir música">
              <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path id="iconPlay" d="M8 5v14l11-7z" fill="currentColor"/>
              </svg>
            </button>
            <div class="music-info">
              <div class="music-title">K‑Pop Mix</div>
              <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <span class="fill" id="musicBar"></span>
              </div>
            </div>
            <div class="eq" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <audio id="musicAudio" preload="none" src="audio/track.mp3" data-title="Tu canción"></audio>
        </div>
        <div class="date-strip" aria-label="Fecha del evento">
          <div class="date-col left">
            <div class="date-day">15</div>
          </div>
          <div class="date-sep" aria-hidden="true"></div>
          <div class="date-col center">
            <div class="date-month">MARZO</div>
          </div>
          <div class="date-sep" aria-hidden="true"></div>
          <div class="date-col right">
            <div class="date-year">2026</div>
          </div>
        </div>
        <div class="info-strip" aria-label="Detalles del evento">
          <div class="info-item">
            <svg class="info-ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a7 7 0 0 1 7 7c0 5.25-6.12 11.07-6.38 11.31a.9.9 0 0 1-1.24 0C11.12 20.07 5 14.25 5 9a7 7 0 0 1 7-7m0 9.5A2.5 2.5 0 1 0 12 6a2.5 2.5 0 0 0 0 5.5Z"/></svg>
            <div class="info-text">
              <div class="label">Lugar</div>
              <div class="value">Av. Estrella 123, Barrio Centro</div>
            </div>
          </div>
          <div class="info-sep" aria-hidden="true"></div>
          <div class="info-item">
            <svg class="info-ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 1 0 .001 20.001A10 10 0 0 0 12 2m.75 5.5h-1.5v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <div class="info-text">
              <div class="label">Hora</div>
              <div class="value">4:00 PM</div>
            </div>
          </div>
        </div>
        <div class="closing">
          <div class="closing-photo">
            <div class="polaroid alt">
              <img src="img/tercera.PNG" alt="Foto adicional">
            </div>
          </div>
          <div class="closing-text">Espero poder contigo en mi día tan especial, ¡no faltes!!</div>
        </div>
        <div class="countdown" id="countdown">
          <div class="count-title">Faltan</div>
          <div class="count-row">
            <div class="count-box">
              <div class="num" id="cdDays">00</div>
              <div class="label">Días</div>
            </div>
            <div class="count-sep">:</div>
            <div class="count-box">
              <div class="num" id="cdHours">00</div>
              <div class="label">Horas</div>
            </div>
            <div class="count-sep">:</div>
            <div class="count-box">
              <div class="num" id="cdMinutes">00</div>
              <div class="label">Min</div>
            </div>
            <div class="count-sep">:</div>
            <div class="count-box">
              <div class="num" id="cdSeconds">00</div>
              <div class="label">Seg</div>
            </div>
          </div>
          <div class="count-note" id="countNote"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function(){
      const canvas=document.getElementById('stars');
      if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let stars=[], glows=[], W=0, H=0, DPR=1, animId;

      function resize(){
        DPR = window.devicePixelRatio || 1;
        W = Math.ceil(canvas.clientWidth * DPR);
        H = Math.ceil(canvas.clientHeight * DPR);
        canvas.width = W; canvas.height = H;
        init();
      }

      function rnd(a,b){return a + Math.random()*(b-a)}

      function init(){
        stars=[]; glows=[];
        const density = (W*H)/14000;
        const count = Math.min(650, Math.max(160, Math.floor(density)));
        for(let i=0;i<count;i++){
          const layer = Math.random()<0.7 ? 1 : 2;
          stars.push({
            x: rnd(0,W),
            y: rnd(0,H),
            r: rnd(0.4, layer===1?1.3:1.8),
            base: rnd(0.4,0.9),
            phase: rnd(0, Math.PI*2),
            tw: rnd(0.0004,0.0012),
            sx: (layer===1?0.006:0.012) * DPR,
            sy: (layer===1?0.0015:0.004) * DPR,
            layer
          });
        }
        const glowCount = Math.floor(count/12);
        for(let i=0;i<glowCount;i++){
          glows.push({
            x: rnd(0,W), y: rnd(0,H),
            r: rnd(8*DPR, 18*DPR),
            phase: rnd(0,Math.PI*2),
            tw: rnd(0.0003,0.001),
            sx: rnd(-0.006,0.006)*DPR,
            sy: rnd(0.004,0.012)*DPR
          });
        }
      }

      function step(){
        ctx.clearRect(0,0,W,H);
        // draw background stars
        for(const s of stars){
          s.phase += s.tw;
          s.x += s.sx; s.y += s.sy;
          if(s.x>W) s.x=0; if(s.x<0) s.x=W;
          if(s.y>H) s.y=0; if(s.y<0) s.y=H;
          const alpha = Math.max(0.25, Math.min(1, s.base*(0.85+0.15*Math.sin(s.phase))));
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
        }
        // draw soft glows
        for(const g of glows){
          g.phase += g.tw;
          g.x += g.sx; g.y += g.sy;
          if(g.x>W) g.x=0; if(g.x<0) g.x=W;
          if(g.y>H) g.y=0; if(g.y<0) g.y=H;
          const a = 0.35 + 0.35*Math.sin(g.phase);
          const grad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
          grad.addColorStop(0, `rgba(255,220,255,${a})`);
          grad.addColorStop(1, 'rgba(255,220,255,0)');
          ctx.fillStyle=grad;
          ctx.beginPath();
          ctx.arc(g.x,g.y,g.r,0,Math.PI*2);
          ctx.fill();
        }
        animId = requestAnimationFrame(step);
      }

      function start(){
        cancelAnimationFrame(animId);
        if(reduce){ // static fallback
          ctx.clearRect(0,0,W,H);
          for(const s of stars){
            ctx.beginPath();
            ctx.fillStyle=`rgba(255,255,255,${s.base})`;
            ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
            ctx.fill();
          }
          for(const g of glows){
            const grad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
            grad.addColorStop(0,'rgba(255,220,255,.5)');
            grad.addColorStop(1,'rgba(255,220,255,0)');
            ctx.fillStyle=grad;
            ctx.beginPath();
            ctx.arc(g.x,g.y,g.r,0,Math.PI*2);
            ctx.fill();
          }
          return;
        }
        step();
      }

      resize();
      start();
      window.addEventListener('resize', ()=>{resize(); start();});
    })();
    (function(){
      const btn=document.getElementById('musicBtn');
      const audio=document.getElementById('musicAudio');
      const icon=document.getElementById('iconPlay');
      const music=document.getElementById('music');
      const card=document.getElementById('musicCard');
      const bar=document.getElementById('musicBar');
      const titleEl=document.querySelector('.music-title');
      if(!btn||!audio||!icon||!music) return;
      function setPlaying(p){
        music.classList.toggle('playing', p);
        if(card) card.classList.toggle('playing', p);
        icon.setAttribute('d', p ? 'M6 5h5v14H6zM13 5h5v14h-5z' : 'M8 5v14l11-7z');
      }
      const initTitle = ()=>{
        if(!titleEl) return;
        const raw = audio.dataset.title || audio.currentSrc || audio.src || '';
        const name = raw.split('/').pop().split('#')[0].split('?')[0].replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').trim();
        titleEl.textContent = name || 'Música';
      };
      initTitle();
      btn.addEventListener('click', async ()=>{
        try{
          if(audio.paused){ await audio.play(); setPlaying(true); }
          else{ audio.pause(); setPlaying(false); }
        }catch(e){}
      });
      audio.addEventListener('timeupdate', ()=>{
        if(!bar) return;
        const p = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        bar.style.width = `${p}%`;
        const pb = btn.getAttribute('aria-label') || 'Reproducir música';
        const now = Math.round(p);
        const pr = document.querySelector('.bar');
        if(pr){ pr.setAttribute('aria-valuenow', String(now)); }
      });
      audio.addEventListener('loadedmetadata', initTitle);
      audio.addEventListener('error', ()=>{ if(titleEl) titleEl.textContent = 'Archivo no disponible'; });
      audio.addEventListener('ended', ()=>setPlaying(false));
      document.addEventListener('visibilitychange', ()=>{ if(document.hidden && !audio.paused){ audio.pause(); setPlaying(false); }});
    })();
    (function(){
      const d=document, qs=(s)=>d.querySelector(s);
      const days=qs('#cdDays'), hrs=qs('#cdHours'), mins=qs('#cdMinutes'), secs=qs('#cdSeconds'), note=qs('#countNote');
      const target=new Date('2026-03-15T16:00:00');
      if(!days||!hrs||!mins||!secs) return;
      function pad(n){return n<10?'0'+n:String(n)}
      function update(){
        const now=new Date();
        let diff=target-now;
        if(diff<=0){
          days.textContent='00'; hrs.textContent='00'; mins.textContent='00'; secs.textContent='00';
          if(note) note.textContent='¡Es hoy!';
          return;
        }
        const dms=24*60*60*1000, hms=60*60*1000, mms=60*1000, sms=1000;
        const dCount=Math.floor(diff/dms); diff%=dms;
        const hCount=Math.floor(diff/hms); diff%=hms;
        const mCount=Math.floor(diff/mms); diff%=mms;
        const sCount=Math.floor(diff/sms);
        days.textContent=pad(dCount);
        hrs.textContent=pad(hCount);
        mins.textContent=pad(mCount);
        secs.textContent=pad(sCount);
        if(note) note.textContent='';
      }
      update();
      setInterval(update, 1000);
    })();
    (function(){
      const wrap=document.getElementById('bgBalloons');
      if(!wrap) return;
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const count = reduce ? 0 : 7;
      for(let i=0;i<count;i++){
        const b=document.createElement('div');
        b.className='balloon';
        b.style.setProperty('--x', `${Math.round(Math.random()*100)}%`);
        b.style.setProperty('--s', (0.7+Math.random()*0.7).toFixed(2));
        b.style.setProperty('--h', String(Math.floor(Math.random()*360)));
        b.style.setProperty('--dur', `${(18+Math.random()*8).toFixed(1)}s`);
        b.style.setProperty('--delay', `${(Math.random()*12).toFixed(1)}s`);
        wrap.appendChild(b);
      }
    })();
  </script>
</body>
</html>
