<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invitación K‑Pop | Emilia cumple 7</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Kanit:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg" aria-hidden="true">
    <canvas id="stars"></canvas>
    <div class="bg-vignette"></div>
  </div>
  <div class="scene">
    <div class="glow"></div>
    <div class="card">
      <div class="curve-wrap">
        <svg class="curve" viewBox="0 0 700 300" aria-label="Te invito a mi cumpleaños">
          <defs>
            <filter id="svgGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <path id="arcTop" d="M 60 288 A 330 330 0 0 1 640 288" fill="none"/>
          <text filter="url(#svgGlow)" font-size="52">
            <textPath href="#arcTop" startOffset="50%" text-anchor="middle" dy="22">Te invito a mi cumpleaños</textPath>
          </text>
        </svg>
      </div>
      <div class="hero-photo">
        <img class="hero-img" src="img/imagen-cumple.png" alt="Imagen del cumpleaños">
      </div>
    </div>
  </div>
  <script>
    (function(){
      const canvas=document.getElementById('stars');
      if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let stars=[], glows=[], W=0, H=0, DPR=1, animId;

      function resize(){
        DPR = window.devicePixelRatio || 1;
        W = Math.ceil(canvas.clientWidth * DPR);
        H = Math.ceil(canvas.clientHeight * DPR);
        canvas.width = W; canvas.height = H;
        init();
      }

      function rnd(a,b){return a + Math.random()*(b-a)}

      function init(){
        stars=[]; glows=[];
        const density = (W*H)/14000;
        const count = Math.min(650, Math.max(160, Math.floor(density)));
        for(let i=0;i<count;i++){
          const layer = Math.random()<0.7 ? 1 : 2;
          stars.push({
            x: rnd(0,W),
            y: rnd(0,H),
            r: rnd(0.4, layer===1?1.3:1.8),
            base: rnd(0.4,0.9),
            phase: rnd(0, Math.PI*2),
            tw: rnd(0.0004,0.0012),
            sx: (layer===1?0.006:0.012) * DPR,
            sy: (layer===1?0.0015:0.004) * DPR,
            layer
          });
        }
        const glowCount = Math.floor(count/12);
        for(let i=0;i<glowCount;i++){
          glows.push({
            x: rnd(0,W), y: rnd(0,H),
            r: rnd(8*DPR, 18*DPR),
            phase: rnd(0,Math.PI*2),
            tw: rnd(0.0003,0.001),
            sx: rnd(-0.006,0.006)*DPR,
            sy: rnd(0.004,0.012)*DPR
          });
        }
      }

      function step(){
        ctx.clearRect(0,0,W,H);
        // draw background stars
        for(const s of stars){
          s.phase += s.tw;
          s.x += s.sx; s.y += s.sy;
          if(s.x>W) s.x=0; if(s.x<0) s.x=W;
          if(s.y>H) s.y=0; if(s.y<0) s.y=H;
          const alpha = Math.max(0.25, Math.min(1, s.base*(0.85+0.15*Math.sin(s.phase))));
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fill();
        }
        // draw soft glows
        for(const g of glows){
          g.phase += g.tw;
          g.x += g.sx; g.y += g.sy;
          if(g.x>W) g.x=0; if(g.x<0) g.x=W;
          if(g.y>H) g.y=0; if(g.y<0) g.y=H;
          const a = 0.35 + 0.35*Math.sin(g.phase);
          const grad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
          grad.addColorStop(0, `rgba(255,220,255,${a})`);
          grad.addColorStop(1, 'rgba(255,220,255,0)');
          ctx.fillStyle=grad;
          ctx.beginPath();
          ctx.arc(g.x,g.y,g.r,0,Math.PI*2);
          ctx.fill();
        }
        animId = requestAnimationFrame(step);
      }

      function start(){
        cancelAnimationFrame(animId);
        if(reduce){ // static fallback
          ctx.clearRect(0,0,W,H);
          for(const s of stars){
            ctx.beginPath();
            ctx.fillStyle=`rgba(255,255,255,${s.base})`;
            ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
            ctx.fill();
          }
          for(const g of glows){
            const grad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
            grad.addColorStop(0,'rgba(255,220,255,.5)');
            grad.addColorStop(1,'rgba(255,220,255,0)');
            ctx.fillStyle=grad;
            ctx.beginPath();
            ctx.arc(g.x,g.y,g.r,0,Math.PI*2);
            ctx.fill();
          }
          return;
        }
        step();
      }

      resize();
      start();
      window.addEventListener('resize', ()=>{resize(); start();});
    })();
  </script>
</body>
</html>
